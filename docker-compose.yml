services:
  web:
    build:
      context: .
      args:
        POETRY_INSTALL_ARGS: "--no-root --with dev"
    ports:
      - "8000:8000"
    env_file:
      - envs/.dev.env
    volumes:
      - .:/app
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      # Vite 기준. (프론트에서 import.meta.env.VITE_API_BASE_URL 로 읽음)
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ../spokit-front:/app
      - front_node_modules:/app/node_modules
    depends_on:
      - web

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spokit_dev}
      POSTGRES_USER: ${POSTGRES_USER:-spokit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spokit}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  front_node_modules:
