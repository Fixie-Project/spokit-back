{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
  <section>
    <h2>로그인</h2>
    {% if form.errors %}
      <p>아이디 또는 비밀번호를 다시 확인해 주세요.</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="grid">
        <label>
          아이디
          {{ form.username }}
        </label>
        <label>
          비밀번호
          {{ form.password }}
        </label>
      </div>
      <button type="submit">로그인</button>
    </form>
    <p>아직 계정이 없다면 <a href="{% url 'user:signup' %}">회원가입</a>을 진행해 주세요.</p>
  </section>
{% endblock %}
