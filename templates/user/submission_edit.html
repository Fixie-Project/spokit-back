{% extends "base.html" %}

{% block title %}소개 신청 수정{% endblock %}

{% block content %}
  <section class="submission-form">
    <h2>소개 신청 수정</h2>
    <p>수정 후에는 운영자가 다시 검토합니다. 진행 상황은 마이페이지에서 확인할 수 있어요.</p>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <label>
          {{ field.label_tag }}
          {{ field }}
          {% if field.help_text %}
            <small>{{ field.help_text }}</small>
          {% endif %}
          {% for error in field.errors %}
            <small class="error">{{ error }}</small>
          {% endfor %}
        </label>
      {% endfor %}
      <button type="submit">수정 완료</button>
    </form>
  </section>
{% endblock %}
