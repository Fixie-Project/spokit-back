{% extends "base.html" %}

{% block title %}픽시 빌드 소개 신청{% endblock %}

{% block content %}
  <section class="submission-form">
    <h2>픽시 빌드 소개 신청</h2>
    <p>당신의 픽시 빌드를 공유하고 싶나요? 운영자가 내용을 정리해 게시해 드립니다.</p>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <label>
          {{ field.label_tag }}
          {{ field }}
          {% if field.help_text %}
            <small>{{ field.help_text }}</small>
          {% endif %}
          {% for error in field.errors %}
            <small class="error">{{ error }}</small>
          {% endfor %}
        </label>
      {% endfor %}
      <button type="submit">신청하기</button>
    </form>
  </section>
{% endblock %}
